name: "Labels: Review"

on:
  pull_request_target:
    types: [review_requested, opened]

jobs:
  add_label:
    runs-on: ubuntu-latest
    steps:
    - uses: actions-ecosystem/action-add-labels@v1.1.3
      with:
        labels: "S: Wymaga Przeglądu"
    - uses: actions-ecosystem/action-remove-labels@v1.3.0
      with:
        labels: "S: Oczekuje na Zmiany"
