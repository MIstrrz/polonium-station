"Zmiany: Sprite":
- changed-files:
  - any-glob-to-any-file: '**/*.rsi/*.png'

"Zmiany: Mapa":
- changed-files:
  - any-glob-to-any-file:
    - 'Resources/Maps/**/*.yml'
    - 'Resources/Prototypes/Maps/**/*.yml'

"Zmiany: UI":
- changed-files:
  - any-glob-to-any-file: '**/*.xaml*'

"Zmiany: Shadery":
- changed-files:
  - any-glob-to-any-file: '**/*.swsl'

"Zmiany: Audio":
- changed-files:
  - any-glob-to-any-file: '**/*.ogg'

"Zmiany: Brak C#":
- changed-files:
  # Equiv to any-glob-to-all as long as this has one matcher. If ALL changed files are not C# files, then apply label.
  - all-globs-to-all-files: "!**/*.cs"

"O: C#":
- changed-files:
  - any-glob-to-any-file: "**/*.cs"

"O: Tłumaczenie":
- changed-files:
  - any-glob-to-any-file: '**/*.ftl'

"Zmiany: Skrypty":
- changed-files:
  - any-glob-to-any-file: 'Tools/**'
  - any-glob-to-any-file: 'Scripts/**'

"Zmiany: Assety":
- changed-files:
  - all-globs-to-any-file: ['**/*.png', '!**/*.rsi/*.png']
  - any-glob-to-any-file: '**/*.ogg'
  - any-glob-to-any-file: '**/*.svg'
  - any-glob-to-any-file: '**/*.ico'

"O: Dokumentacja":
- changed-files:
  - any-glob-to-any-file: 'Resources/ServerInfo/**/*.xml'
